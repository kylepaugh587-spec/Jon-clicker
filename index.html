<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jonway Serfers</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Jonway Serfers</h1>
      <p>Move with A/D or ←/→. Dodge, collect coins, and outrun Jon!</p>
    </header>

    <section class="hud">
      <div>Coins: <span id="coins">0</span></div>
      <div>Distance: <span id="distance">0</span>m</div>
      <div>Best: <span id="best">0</span>m</div>
      <div>Speed Lv: <span id="speedLevel">0</span></div>
      <div>Magnet Lv: <span id="magnetLevel">0</span></div>
      <div>Shield Lv: <span id="shieldLevel">0</span></div>
    </section>

    <section class="game-wrap">
      <canvas id="game" width="420" height="640" aria-label="Jonway Serfers game"></canvas>
      <div id="overlay" class="overlay hidden">
        <h2 id="overlayTitle">Game Over</h2>
        <p id="overlayText"></p>
        <button id="restartBtn">Play Again</button>
      </div>
    </section>

    <section class="shop">
      <h2>Upgrade Shop</h2>
      <div class="shop-grid">
        <button id="buySpeed">Buy Speed Boost (<span id="speedCost">15</span> coins)</button>
        <button id="buyMagnet">Buy Coin Magnet (<span id="magnetCost">20</span> coins)</button>
        <button id="buyShield">Buy Extra Shield (<span id="shieldCost">25</span> coins)</button>
      </div>
      <p class="note">Upgrades persist between runs and cost coins.</p>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
